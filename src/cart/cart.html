<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link rel="stylesheet" href="styles/cart.css">
</head>

<body>

    <h1>Your Cart</h1>

    <div class="cart-container">

        <!-- Example Cart Item -->
        <div class="cart-item">
            <img src="../images/banner.jpg" alt="Tent">

            <div class="item-details">
                <h2>2-Person Tent</h2>
                <p>$120</p>
            </div>

            <button class="remove-btn">Remove</button>
        </div>

        <!-- Another Item -->
        <div class="cart-item">
            <img src="../images/banner.jpg" alt="Backpack">

            <div class="item-details">
                <h2>Hiking Backpack</h2>
                <p>$80</p>
            </div>

            <button class="remove-btn">Remove</button>
        </div>

    </div>

</body>

</html>
